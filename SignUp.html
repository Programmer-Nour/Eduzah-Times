<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
        integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="SignUp.css">
</head>

<body>

    <!-------------------------------------------------------------------- NavBar ------------------------------------------------------------------------------------->

    <div class="NavBar">
        <div class="NavBarLogo">
            <img src="../Images/width_1600.png" alt="Eduzah Times Logo">
        </div>
        <div class="NavLinks">
            <ul>
                <li><a href="./index.html">Home</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="./categorize.html">Categories</a></li>
                <li><a href="#">Contact Us</a></li>
                <li><span class="Active"><a href="#">Login/Sign Up</a></span></li>
            </ul>
        </div>
    </div>

    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------>

    <!-------------------------------------------------------------------- Sign Up ------------------------------------------------------------------------------------->

    <div class="SignUp">
        <h2>Sign Up</h2>
        <form>
            <input type="text" placeholder="FullName" name="FullName" required>
            <input type="email" placeholder="Email" name="Email" required>
            <input type="password" placeholder="Password" name="Password" required>
            <input type="password" placeholder="Confirm Password" name="ConfirmPassword" required>
            <div class="terms">
                <input type="checkbox" id="Conditions" required name="Terms & Conditions">
                <label for="Conditions">I agree to the terms and conditions</label>
            </div>
            <p>Already Have An Account?<a href="#">Login</a></p>
            <button type="submit">Create Account</button>
        </form>
    </div>

    <!------------------------------------------------------------------------------------------------------------------------------------------------------------------>

</body>

</html>
